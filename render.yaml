services:
  - type: web
    name: developer-portfolio-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_ORIGIN
        value: https://developer-portfolio-web.onrender.com
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RECEIVER_EMAIL
        sync: false

  - type: static_site
    name: developer-portfolio-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://developer-portfolio-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
